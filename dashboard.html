<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Information System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">Student Information System</h1>

    <!-- Add Student Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form action="/add" method="POST" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="name" class="form-control" placeholder="Student Name" required>
                </div>
                <div class="col-md-4">
                    <input type="number" name="grade" class="form-control" placeholder="Grade" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="section" class="form-control" placeholder="Section" required>
                </div>
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-primary mt-2">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Students Table -->
    <div class="card">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Grade</th>
                        <th>Section</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student.id }}</td>
                        <td>{{ student.name }}</td>
                        <td>{{ student.grade }}</td>
                        <td>{{ student.section }}</td>
                        <td>
                            <a href="/edit/{{ student.id }}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="/delete/{{ student.id }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center">No students found</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
