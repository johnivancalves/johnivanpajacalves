<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">Edit Student</h1>

    <div class="card">
        <div class="card-body">
            <form action="/update/{{ student.id }}" method="POST" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                </div>
                <div class="col-md-4">
                    <input type="number" name="grade" class="form-control" value="{{ student.grade }}" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="section" class="form-control" value="{{ student.section }}" required>
                </div>
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-success mt-2">Update Student</button>
                    <a href="/" class="btn btn-secondary mt-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
